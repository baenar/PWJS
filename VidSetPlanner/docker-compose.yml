services:
  test:
    image: maven:3-eclipse-temurin-21
    working_dir: /workspace
    volumes:
      - .:/workspace
      - maven-cache:/root/.m2
    command: ["mvn", "test"]

  clean-test:
    image: maven:3-eclipse-temurin-21
    working_dir: /workspace
    volumes:
      - .:/workspace
      - maven-cache:/root/.m2
    command: ["mvn", "clean", "test"]

  compile:
    image: maven:3-eclipse-temurin-21
    working_dir: /workspace
    volumes:
      - .:/workspace
      - maven-cache:/root/.m2
    command: ["mvn", "clean", "compile"]

  package:
    image: maven:3-eclipse-temurin-21
    working_dir: /workspace
    volumes:
      - .:/workspace
      - maven-cache:/root/.m2
    command: ["mvn", "clean", "package"]

  shell:
    image: maven:3-eclipse-temurin-21
    working_dir: /workspace
    volumes:
      - .:/workspace
      - maven-cache:/root/.m2
    command: ["bash"]

volumes:
  maven-cache:

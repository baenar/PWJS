services:
  test:
    build: .
    working_dir: /workspace
    volumes:
      - .:/workspace
      - sbt-cache:/root/.sbt
      - ivy-cache:/root/.ivy2
      - coursier-cache:/root/.cache/coursier
    command: ["sbt", "test"]

  clean-test:
    build: .
    working_dir: /workspace
    volumes:
      - .:/workspace
      - sbt-cache:/root/.sbt
      - ivy-cache:/root/.ivy2
      - coursier-cache:/root/.cache/coursier
    command: ["sbt", "clean", "test"]

  compile:
    build: .
    working_dir: /workspace
    volumes:
      - .:/workspace
      - sbt-cache:/root/.sbt
      - ivy-cache:/root/.ivy2
      - coursier-cache:/root/.cache/coursier
    command: ["sbt", "compile"]

  package:
    build: .
    working_dir: /workspace
    volumes:
      - .:/workspace
      - sbt-cache:/root/.sbt
      - ivy-cache:/root/.ivy2
      - coursier-cache:/root/.cache/coursier
    command: ["sbt", "package"]

  shell:
    build: .
    working_dir: /workspace
    volumes:
      - .:/workspace
      - sbt-cache:/root/.sbt
      - ivy-cache:/root/.ivy2
      - coursier-cache:/root/.cache/coursier
    command: ["bash"]

volumes:
  sbt-cache:
  ivy-cache:
  coursier-cache:
